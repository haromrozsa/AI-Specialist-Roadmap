version: '3.8'

services:
  localstack:
    image: localstack/localstack:latest
    container_name: sagemaker-localstack
    ports:
      - "4566:4566"  # LocalStack gateway
    environment:
      - SERVICES=s3,sagemaker,iam,logs
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - LOCALSTACK_HOST=localhost:4566
    volumes:
      - "./volumes/localstack:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
    networks:
      - sagemaker-network

networks:
  sagemaker-network:
    driver: bridge
